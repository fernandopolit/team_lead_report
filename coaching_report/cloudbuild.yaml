steps:
  # ── 1. Run tests before building the image ─────────────────────────────────
  - name: python:3.11-slim
    id: run-tests
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt
        python -m pytest tests/ -v --tb=short
    dir: .

  # ── 2. Build the Docker image ───────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/cx-coaching-report:latest
      - -t
      - gcr.io/$PROJECT_ID/cx-coaching-report:$SHORT_SHA
      - .
    waitFor:
      - run-tests

  # ── 3. Push both tags ───────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args: [push, gcr.io/$PROJECT_ID/cx-coaching-report:latest]
    waitFor:
      - build-image

  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args: [push, gcr.io/$PROJECT_ID/cx-coaching-report:$SHORT_SHA]
    waitFor:
      - build-image

images:
  - gcr.io/$PROJECT_ID/cx-coaching-report:latest
  - gcr.io/$PROJECT_ID/cx-coaching-report:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
